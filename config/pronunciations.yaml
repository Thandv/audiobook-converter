# Pronunciation overrides for invented names.
#
# The pipeline does a whole-word, case-preserving substitution before TTS.
# Use phonetic-friendly English spellings — Kokoro routes through espeak-ng,
# so spell things the way you want them spoken aloud.
#
# Format:  Original: PhoneticSpelling
# Match is whole-word, case-insensitive. Output preserves the original casing
# (first letter capitalized vs. all caps) where reasonable.

