# Voice cast configuration.
#
# Top-level shape:
#   narrator: { voice, speed, emotions? }
#   cast:
#     <Name>: { voice, speed, emotions? }
#
# `voice` is backend-specific:
#   - Kokoro: voice ID like 'bm_george'
#   - XTTS:   speaker name in the fine-tuned model (after `audiobook train`)
#
# `emotions` is an OPTIONAL map of emotion -> partial { voice, speed }
# overrides. Emotions are detected automatically from dialogue tags
# (whispered/shouted/growled/etc.) and apply only to that utterance.
# Recognized emotion labels:
#   neutral, happy, sad, angry, fearful, surprised,
#   disgusted, whispered, excited, calm
#
# ---- Kokoro v1.0 voices (only top-graded shown) ----
# American female:  af_heart, af_bella, af_nicole, af_sarah, af_sky
# American male:    am_michael, am_fenrir, am_puck, am_eric, am_liam
# British female:   bf_emma, bf_isabella, bf_alice, bf_lily
# British male:     bm_george, bm_fable, bm_lewis, bm_daniel

narrator:
  voice: bm_george
  speed: 0.92
  emotions:
    whispered: { speed: 0.78 }
    calm:      { speed: 0.88 }
    excited:   { speed: 1.02 }
    angry:     { speed: 0.98 }
    sad:       { speed: 0.86 }

cast:
